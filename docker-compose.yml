version: '3.8'

services:
  qure-app:
    build: .
    container_name: qure-hospital-hub
    ports:
      - "3010:3000"
    restart: always
    environment:
      - NODE_ENV=production
      - QUEUE_DB_SERVER=${QUEUE_DB_SERVER}
      - QUEUE_DB_NAME=${QUEUE_DB_NAME}
      - QUEUE_DB_USER=${QUEUE_DB_USER}
      - QUEUE_DB_PASSWORD=${QUEUE_DB_PASSWORD}
      - HOSPITAL_DB_SERVER=${HOSPITAL_DB_SERVER}
      - HOSPITAL_DB_NAME=${HOSPITAL_DB_NAME}
      - HOSPITAL_DB_USER=${HOSPITAL_DB_USER}
      - HOSPITAL_DB_PASSWORD=${HOSPITAL_DB_PASSWORD}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
