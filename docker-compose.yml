version: '3.8'

services:
  qure-app:
    build: .
    container_name: qure-hospital-hub
    ports:
      - "3010:3000"
    restart: always
    environment:
      - NODE_ENV=production
      # --- QUEUE DATABASE ---
      - QUEUE_DB_SERVER=${QUEUE_DB_SERVER:-192.168.1.3}
      - QUEUE_DB_NAME=${QUEUE_DB_NAME:-HospitalQueueDB}
      - QUEUE_DB_USER=${QUEUE_DB_USER:-hqdb}
      - QUEUE_DB_PASSWORD=${QUEUE_DB_PASSWORD:-VibeQ@123_SecurePassword}
      
      # --- HOSPITAL DATABASE ---
      - HOSPITAL_DB_SERVER=${HOSPITAL_DB_SERVER:-192.168.1.3}
      - HOSPITAL_DB_NAME=${HOSPITAL_DB_NAME:-medilogs}
      - HOSPITAL_DB_USER=${HOSPITAL_DB_USER:-sa}
      - HOSPITAL_DB_PASSWORD=${HOSPITAL_DB_PASSWORD:-rfx14w}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
